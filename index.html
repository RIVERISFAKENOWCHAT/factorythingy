<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Thingy - Part 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Factory Thingy — Part 1</h1>
    <p>Left click to place selected building. Press <kbd>R</kbd> to rotate. Click a sorter to choose its item filter.</p>
  </header>

  <main>
    <section class="panel" id="build-panel">
      <h2>Build</h2>
      <div id="building-buttons"></div>
      <p id="rotation">Direction: Right →</p>
      <button id="erase">Eraser</button>
    </section>

    <section class="game-area">
      <canvas id="game" width="960" height="672"></canvas>
    </section>

    <section class="panel" id="inventory-panel">
      <h2>Core Inventory</h2>
      <div id="inventory"></div>
      <h3>Legend</h3>
      <ul id="ore-legend"></ul>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
