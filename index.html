<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Thingy - Part 1+</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Factory Thingy</h1>
    <p>Left click place. R rotate. Wheel zoom. Middle-drag pan. Right click opens building inspector.</p>
    <p id="message"></p>
    <p id="world-stats"></p>
  </header>

  <main>
    <section class="panel" id="build-panel">
      <h2>Build</h2>
      <div id="building-buttons"></div>
      <p id="rotation">Direction: right</p>
      <button id="erase">Eraser</button>
    </section>

    <section class="game-area">
      <canvas id="game" width="1200" height="760"></canvas>
    </section>

    <section class="panel" id="inventory-panel">
      <h2>Core Storage</h2>
      <div id="inventory"></div>
      <h3>Ore Legend</h3>
      <ul id="ore-legend"></ul>
    </section>
  </main>

  <aside id="inspector" class="hidden">
    <h3 id="inspector-title">Inspector</h3>
    <pre id="inspector-body"></pre>
  </aside>

  <script src="game.js"></script>
</body>
</html>
